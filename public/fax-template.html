<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ご連絡 - 株式会社ハイパーギア</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Yu Gothic", "Meiryo", sans-serif; font-size: 13px; color: #1a1a1a; background: #e8e8e8; display: flex; justify-content: center; padding: 32px 16px; }
    .page { background: #fff; width: 210mm; min-height: 297mm; padding: 18mm; box-shadow: 0 4px 24px rgba(0,0,0,0.18); position: relative; }
    .header { display: flex; justify-content: space-between; margin-bottom: 6mm; }
    .header-left { display: flex; flex-direction: column; gap: 5px; }
    .doc-title { font-size: 22px; font-weight: bold; letter-spacing: 4px; }
    .doc-date { font-size: 12px; }
    .header-right { text-align: right; font-size: 11px; }
    .header-right img { height: 60px; width: auto; margin-bottom: 5px; }
    .divider { border: none; border-top: 1px solid #888; margin-bottom: 8mm; }
    .field-row { display: flex; align-items: center; margin-bottom: 6mm; gap: 8px; }
    .field-label { font-size: 16px; font-weight: bold; min-width: 50px; }
    .dest-input { border: none; border-bottom: 1px solid #000; width: 250px; padding: 5px; font-size: 16px; outline: none; }
    .subject-input { border: none; border-bottom: 1px solid #000; flex: 1; padding: 5px; font-size: 16px; outline: none; }
    .greeting { line-height: 2; margin-bottom: 6mm; }
    .body-textarea { width: 100%; min-height: 400px; border: 1px solid #ccc; padding: 15px; line-height: 2; font-size: 14px; outline: none; }
    .keigo { text-align: right; margin-top: 4mm; }
    @media print { body { background: #fff; padding: 0; } .page { box-shadow: none; } .print-btn { display: none; } .body-textarea { border: 1px solid #eee; } }
    .print-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: #003087; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <div class="doc-title">ご連絡</div>
      <div class="doc-date" id="currentDate"></div>
      <div style="font-size: 12px; margin-top: 5px;">送信枚数： 全 <input type="text" style="width:30px; border:none; border-bottom:1px solid #000; text-align:center;" value="1"> 枚（本状含む）</div>
    </div>
    <div class="header-right">
      <img src="/hg_logo.jpg" alt="ロゴ">
      <div class="company-info">
        〒330-0851<br>
        埼玉県さいたま市大宮区櫛引町1-72-2 HANAビル1,2F<br>
        <span style="font-weight:bold;">株式会社 ハイパーギア</span><br>
        TEL：（048）654-2141 / FAX：（048）654-2142<br>
        担当：野添
      </div>
    </div>
  </div>
  <hr class="divider">
  <div class="field-row">
    <div class="field-label">宛先</div>
    <input class="dest-input" type="text" placeholder="">
    <span style="font-size:16px;">様</span>
  </div>
  <div class="field-row">
    <div class="field-label">件名</div>
    <input class="subject-input" type="text" placeholder="">
  </div>
  <div class="greeting">
    拝啓　毎々格別のお引き立てに預かりありがたく御礼申し上げます。<br>
    さて、下記のようにご連絡申し上げますので、よろしくお願いいたします。<br>
  </div>
  <textarea class="body-textarea" placeholder=""></textarea>
  <div class="keigo">敬具</div>
</div>
<button class="print-btn" onclick="window.print()">🖨 印刷 / PDF保存</button>

<script>
  const today = new Date();
  document.getElementById('currentDate').textContent = today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';
</script>
</body>
</html>
